<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Cài đặt OTP</title>
</head>
<body>
<section layout:fragment="content">
    <div class="admin-page-wrap">
        <div class="admin-shell">
            <div class="admin-toolbar">
                <div class="admin-title-block">
                    <h3 class="admin-title">
                        <i class="fa-solid fa-shield"></i>
                        Cài đặt OTP với Microsoft Authenticator
                    </h3>
                    <p class="admin-subtitle">Quét mã QR và xác thực OTP 6 số.</p>
                </div>
            </div>

            <div class="admin-table-card p-4">
                <div class="row g-4 align-items-center">
                    <div class="col-md-4 text-center">
                        <img th:src="${qrCodeDataUri}" alt="OTP QR code" style="max-width: 260px; width: 100%;">
                    </div>
                    <div class="col-md-8">
                        <ol class="mb-3">
                            <li>Mở Microsoft Authenticator trên điện thoại.</li>
                            <li>Chọn Add account -> Other account.</li>
                            <li>Quét mã QR bên cạnh.</li>
                            <li>Nhập mã OTP 6 số để hoàn tất kích hoạt.</li>
                        </ol>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Secret key thủ công (khi quét QR lỗi)</label>
                            <div class="form-control" th:text="${manualSecret}">SECRET</div>
                        </div>
                        <form method="post" th:action="@{/loyalty/mfa/verify}" class="d-flex gap-2 align-items-center">
                            <input type="text" name="otpCode" class="form-control" style="max-width: 200px"
                                   placeholder="Nhập OTP 6 số" maxlength="6" required>
                            <button type="submit" class="admin-btn admin-btn--accent">
                                Xác thực OTP
                            </button>
                            <a th:href="@{/loyalty}" class="admin-btn admin-btn--outline">Quay lại</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
