<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Order Confirmation</title>
</head>
<body>
<section layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="modern-card p-5 text-center mt-5 mb-5">
                <div class="mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success text-white rounded-circle" style="width: 80px; height: 80px;">
                        <i class="fa-solid fa-check fa-3x"></i>
                    </div>
                </div>

                <h2 class="fw-bold mb-3 text-success">ORDER CONFIRMATION</h2>
                <p class="text-muted mb-4 fs-5" th:text="${message}">Your order has been created.</p>
                <p th:if="${error}" class="text-danger fw-bold mb-4" th:text="${error}">Payment failed.</p>

                <div th:if="${order != null}" class="bg-light p-4 rounded mb-4 text-start">
                    <h6 class="fw-bold mb-2"><i class="fa-regular fa-file-lines me-2"></i>Order information</h6>
                    <p class="mb-1"><strong>Order ID:</strong> <span th:text="${order.id}">1</span></p>
                    <p class="mb-1"><strong>Total payable:</strong> <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span></p>
                    <p class="mb-1"><strong>Payment method:</strong> <span th:text="${order.payment}">COD</span></p>
                    <p class="mb-0"><strong>Payment status:</strong> <span th:text="${order.paymentStatus}">PAID</span></p>
                </div>

                <div class="d-grid gap-2 d-sm-flex justify-content-center">
                    <a href="/" class="btn btn-secondary-tgdd px-5 rounded-pill fw-bold">
                        <i class="fa-solid fa-arrow-left me-2"></i> CONTINUE SHOPPING
                    </a>
                    <a href="/order/history" class="btn btn-outline-secondary px-4 rounded-pill">
                        <i class="fa-solid fa-clock-rotate-left me-2"></i> ORDER HISTORY
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
