<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Chi Tiết Đơn Hàng</title>
</head>
<body>
<section layout:fragment="content">
<div class="main-container admin-page">
    
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-4 bg-white rounded shadow-sm">
        <div>
             <h4 class="mb-1 fw-bold">Chi Tiết Đơn Hàng <span class="text-primary">#DH-[[${order.id}]]</span></h4>
             <p class="mb-0 text-muted small">Ngày đặt: <span class="fw-bold">Vừa xong</span></p>
        </div>
        <div class="d-flex gap-2">
            <a href="/orders" class="btn btn-outline-secondary rounded-pill px-3">
                <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
            </a>
            <!-- Status Actions -->
            <form th:if="${order.status == 'PENDING' or order.status == null}" th:action="@{/orders/confirm/{id}(id=${order.id})}" method="post">
                 <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold">
                     <i class="fa-solid fa-check me-1"></i> XÁC NHẬN ĐƠN
                 </button>
            </form>
            <button th:if="${order.status == 'CONFIRMED'}" class="btn btn-success rounded-pill px-4" disabled>
                <i class="fa-solid fa-check-double me-1"></i> ĐÃ XỬ LÝ
            </button>
        </div>
    </div>

    <div class="row">
        <!-- LEFT: Order Info -->
        <div class="col-lg-8">
            <div class="modern-card p-0 overflow-hidden mb-4">
                <div class="bg-warning bg-opacity-10 p-3 border-bottom border-warning border-opacity-25">
                    <h6 class="mb-0 fw-bold text-dark text-uppercase">Danh sách sản phẩm</h6>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="bg-light small text-muted">
                        <tr>
                            <th class="ps-4">Sản Phẩm</th>
                            <th class="text-center">Số Lượng</th>
                            <th class="text-end">Đơn Giá</th>
                            <th class="text-end pe-4">Thành Tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="detail : ${order.orderDetails}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center gap-3">
                                    <img th:if="${detail.product.image != null}" 
                                         th:src="${detail.product.image.startsWith('http') ? detail.product.image : '/product-images/' + detail.product.image}"
                                         width="48" height="48" class="rounded border bg-white" style="object-fit: cover;">
                                    <span class="fw-bold text-dark" th:text="${detail.product.name}">Product Name</span>
                                </div>
                            </td>
                            <td class="text-center align-middle" th:text="${detail.quantity}">1</td>
                            <td class="text-end align-middle text-muted" th:text="${#numbers.formatDecimal(detail.product.price, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                            <td class="text-end pe-4 align-middle fw-bold" th:text="${#numbers.formatDecimal(detail.product.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                        </tr>
                        </tbody>
                        <tfoot class="bg-light">
                            <tr th:if="${order.loyaltyPointsUsed > 0}">
                                <td colspan="3" class="text-end fw-bold pt-2 pb-2">Điểm tích lũy đã dùng:</td>
                                <td class="text-end pe-4 text-warning fw-bold pt-2 pb-2" th:text="'-' + ${#numbers.formatDecimal(order.loyaltyPointsUsed, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                            </tr>
                            <tr>
                                <td colspan="3" class="text-end fw-bold pt-3 pb-3">Tổng Cộng:</td>
                                <td class="text-end pe-4 text-danger fw-bold fs-5 pt-3 pb-3" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                            </tr>
                            <tr th:if="${order.loyaltyPointsEarned > 0}">
                                <td colspan="3" class="text-end pt-2 pb-2">Điểm tích lũy được:</td>
                                <td class="text-end pe-4 text-success fw-bold pt-2 pb-2" th:text="'+' + ${#numbers.formatDecimal(order.loyaltyPointsEarned, 0, 'COMMA', 0, 'POINT')} + ' điểm'"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- RIGHT: Customer Info -->
        <div class="col-lg-4">
            <div class="modern-card p-4 mb-4">
                <h6 class="fw-bold mb-3 border-bottom pb-2">Thông Tin Khách Hàng</h6>
                
                <div class="mb-3">
                    <label class="small text-muted d-block">Họ và Tên</label>
                    <span class="fw-bold" th:text="${order.customerName}">Nguyễn Văn A</span>
                </div>
                
                <div class="mb-3">
                    <label class="small text-muted d-block">Trạng Thái Đơn</label>
                    <span class="badge" 
                          th:classappend="${order.status == 'PENDING' ? 'bg-warning text-dark' : 'bg-success'}"
                          th:text="${order.status == 'PENDING' ? 'Chờ xác nhận' : 'Đã hoàn thành'}">
                        Pending
                    </span>
                </div>

                <div class="mb-3">
                    <label class="small text-muted d-block">Phương thức thanh toán</label>
                    <span class="fw-bold"><i class="fa-solid fa-money-bill-wave text-success me-1"></i> COD</span>
                </div>
            </div>
            
            <div class="modern-card p-4 text-center">
                <i class="fa-solid fa-headset fa-3x text-muted mb-3 opacity-25"></i>
                <p class="small text-muted mb-0">Cần hỗ trợ? Liên hệ IT Support.</p>
            </div>
        </div>
    </div>

</div>
</section>
</body>
</html>
