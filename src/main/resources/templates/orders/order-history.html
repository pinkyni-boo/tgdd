<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Tra Cứu Đơn Hàng</title>
</head>
<body>
<section layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="bg-white rounded shadow-sm p-4 mb-4">
                <h3 class="section-title">Tra Cứu Lịch Sử Đơn Hàng</h3>
                <p class="text-muted small mb-4">Nhập tên khách hàng bạn đã dùng khi đặt hàng để xem danh sách đơn hàng.</p>
                
                <form th:action="@{/order/history}" method="post" class="d-flex gap-2">
                    <input type="text" name="customerName" class="form-control" placeholder="Ví dụ: Nguyễn Văn A" required th:value="${customerName}">
                    <button type="submit" class="btn btn-primary-tgdd fw-bold px-4">
                        <i class="fa-solid fa-magnifying-glass me-2"></i> TÌM KIẾM
                    </button>
                </form>
            </div>

            <div th:if="${orders != null}">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0 text-uppercase">Kết quả tìm kiếm</h5>
                    <span class="badge bg-secondary" th:text="${orders.size()} + ' đơn hàng'"></span>
                </div>
                
                <div th:if="${orders.empty}" class="text-center py-5 bg-white rounded shadow-sm">
                    <i class="fa-solid fa-box-open fa-3x text-muted mb-3"></i>
                    <p class="text-muted">Không tìm thấy đơn hàng nào với tên này.</p>
                </div>

                <div th:unless="${orders.empty}" class="d-flex flex-column gap-3">
                    <!-- Order Card Loop -->
                    <div th:each="order : ${orders}" class="modern-card p-0 overflow-hidden">
                        <!-- Card Header -->
                        <div class="d-flex justify-content-between align-items-center p-3 bg-light border-bottom">
                            <div>
                                <span class="fw-bold me-2">Đơn hàng <span class="text-primary">#DH-[[${order.id}]]</span></span>
                                <span class="text-muted small"><i class="fa-regular fa-user me-1"></i> [[${order.customerName}]]</span>
                            </div>
                            <span class="badge" 
                                  th:classappend="${order.status == 'PENDING' ? 'bg-warning text-dark' : 'bg-success'}"
                                  th:text="${order.status == 'PENDING' ? 'Chờ xác nhận' : 'Đã hoàn thành'}">
                                Trạng thái
                            </span>
                        </div>

                        <!-- Order Items -->
                        <div class="p-3">
                             <div th:each="detail : ${order.orderDetails}" class="d-flex align-items-center mb-3 border-bottom pb-2 last-no-border">
                                <img th:if="${detail.product.image != null}"
                                     th:src="${detail.product.image.startsWith('http') ? detail.product.image : '/product-images/' + detail.product.image}"
                                     class="rounded border me-3" width="50" height="50" style="object-fit: cover;">
                                
                                <div class="flex-grow-1">
                                    <h6 class="mb-0 fw-bold small" th:text="${detail.product.name}">Product Name</h6>
                                    <div class="d-flex justify-content-between align-items-center mt-1">
                                        <span class="text-muted small">Số lượng: <span class="fw-bold text-dark">[[${detail.quantity}]]</span></span>
                                    </div>
                                </div>
                                
                                <span class="fw-bold text-danger text-end" style="min-width: 80px;" 
                                      th:text="${#numbers.formatDecimal(detail.product.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + '₫'">
                                </span>
                             </div>
                        </div>

                        <!-- Card Footer -->
                        <div class="p-3 bg-light border-top d-flex justify-content-between align-items-center">
                            <span class="text-muted small">Tổng tiền thanh toán:</span>
                            <span class="text-danger fw-bold fs-5" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        .last-no-border:last-child { border-bottom: none !important; padding-bottom: 0 !important; margin-bottom: 0 !important; }
    </style>
</section>
</body>
</html>
