<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Tra cuu don hang</title>
</head>
<body>
<section layout:fragment="content">
    <div class="admin-page-wrap">
        <div class="admin-shell">
            <div class="admin-toolbar">
                <div class="admin-title-block">
                    <h3 class="admin-title">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tra cuu don hang
                    </h3>
                    <p class="admin-subtitle">Nhap so dien thoai hoac ten khach hang de xem lich su don</p>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger admin-alert" role="alert" th:text="${error}"></div>

            <form th:action="@{/order/history}" method="post" class="row g-2 mb-3">
                <div class="col-md-9">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Vi du: 097xxxxxxx hoac Nguyen Van A"
                           required
                           th:value="${keyword}">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="admin-btn admin-btn--accent w-100">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tra cuu
                    </button>
                </div>
            </form>

            <div th:if="${orders != null}">
                <div class="admin-stat-row mb-2">
                    <div class="admin-stat-chip">
                        <i class="fa-solid fa-box-open"></i>
                        Ket qua:
                        <strong th:text="${orders.size()}">0</strong>
                        don
                    </div>
                </div>

                <div th:if="${orders.empty}" class="admin-empty">
                    <p>Khong tim thay don hang phu hop.</p>
                </div>

                <div th:unless="${orders.empty}" class="admin-table-card">
                    <div class="table-responsive">
                        <table class="table admin-table align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Khach hang</th>
                                <th>So dien thoai</th>
                                <th>Tong tien</th>
                                <th>Trang thai</th>
                                <th>Thanh toan</th>
                                <th>Chi tiet</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.id}">1</td>
                                <td th:text="${order.customerName}">Khach hang</td>
                                <td th:text="${order.phone != null and !#strings.isEmpty(order.phone) ? order.phone : '-'}">-</td>
                                <td class="admin-price"
                                    th:text="${#numbers.formatDecimal(order.totalAmount > 0 ? order.totalAmount : order.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    0đ
                                </td>
                                <td>
                                    <span class="admin-tag"
                                          th:classappend="${order.status == 'PENDING' ? ' admin-tag--muted' : ' admin-tag--success'}"
                                          th:text="${order.status != null ? order.status : 'PENDING'}">
                                        PENDING
                                    </span>
                                </td>
                                <td>
                                    <span class="admin-tag"
                                          th:classappend="${order.paymentStatus == 'PAID' ? ' admin-tag--success' : ' admin-tag--muted'}"
                                          th:text="${order.paymentStatus != null ? order.paymentStatus : 'UNPAID'}">
                                        UNPAID
                                    </span>
                                </td>
                                <td>
                                    <a th:if="${order.phone != null and !#strings.isEmpty(order.phone)}"
                                       th:href="@{/order/history/detail/{id}(id=${order.id}, phone=${order.phone})}"
                                       class="admin-row-btn admin-row-btn--edit">
                                        <i class="fa-solid fa-eye"></i>
                                        Xem
                                    </a>
                                    <span th:if="${order.phone == null or #strings.isEmpty(order.phone)}" class="text-muted">Khong co SDT</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
