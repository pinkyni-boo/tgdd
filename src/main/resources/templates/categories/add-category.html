<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Th&#234;m Danh M&#7909;c</title>
</head>
<body>
<section layout:fragment="content">
    <div class="admin-page-wrap">
        <div id="category-app">
            <div class="card-custom">
                <div class="card-header-custom">
                    <i class="fa-solid fa-folder-tree"></i>
                    TH&#202;M DANH M&#7908;C M&#7898;I
                </div>
                <div class="card-body-custom">
                    <form th:action="@{/categories/add}" th:object="${category}" method="post">

                        <div class="form-group">
                            <label class="form-label">T&#234;n danh m&#7909;c</label>
                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control-custom"
                                   placeholder="V&#237; d&#7909;: &#272;i&#7879;n tho&#7841;i, Laptop..."
                                   required />
                        </div>

                        <div class="form-group">
                            <label class="form-label">Danh m&#7909;c cha</label>
                            <select th:field="*{parent}" class="form-select-custom">
                                <option value="">-- Kh&#244;ng c&#243; (Danh m&#7909;c g&#7889;c) --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Ch&#7885;n Icon &#273;&#7841;i di&#7879;n</label>
                            <input type="hidden" th:field="*{icon}" id="iconInput"/>
                            <div class="icon-grid">
                                <div class="icon-option" data-icon="fa-solid fa-mobile-screen-button"><i class="fa-solid fa-mobile-screen-button"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-laptop"><i class="fa-solid fa-laptop"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-tablet"><i class="fa-solid fa-tablet"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-desktop"><i class="fa-solid fa-desktop"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-tv"><i class="fa-solid fa-tv"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-headphones"><i class="fa-solid fa-headphones"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-camera"><i class="fa-solid fa-camera"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-gamepad"><i class="fa-solid fa-gamepad"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-keyboard"><i class="fa-solid fa-keyboard"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-mouse"><i class="fa-solid fa-mouse"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-microchip"><i class="fa-solid fa-microchip"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-wifi"><i class="fa-solid fa-wifi"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-battery-full"><i class="fa-solid fa-battery-full"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-bolt"><i class="fa-solid fa-bolt"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-plug"><i class="fa-solid fa-plug"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-print"><i class="fa-solid fa-print"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-cart-shopping"><i class="fa-solid fa-cart-shopping"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-tag"><i class="fa-solid fa-tag"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-star"><i class="fa-solid fa-star"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-heart"><i class="fa-solid fa-heart"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-fire"><i class="fa-solid fa-fire"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-gift"><i class="fa-solid fa-gift"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-box"><i class="fa-solid fa-box"></i></div>
                                <div class="icon-option" data-icon="fa-solid fa-truck"><i class="fa-solid fa-truck"></i></div>
                            </div>
                        </div>

                        <div class="action-group">
                            <button type="submit" class="btn-save">
                                <i class="fa-solid fa-check-circle"></i>
                                L&#431;U D&#7918; LI&#7878;U
                            </button>
                            <a th:href="@{/categories}" class="btn-back">
                                <i class="fa-solid fa-arrow-left"></i>
                                Quay l&#7841;i
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function bindCategoryIcons() {
            var icons = document.querySelectorAll('#category-app .icon-option');
            var iconInput = document.getElementById('iconInput');
            if (!iconInput) return;
            icons.forEach(function(icon) {
                icon.addEventListener('click', function() {
                    icons.forEach(function(i) { i.classList.remove('selected'); });
                    this.classList.add('selected');
                    iconInput.value = this.dataset.icon;
                });
            });
            var current = iconInput.value;
            if (current) {
                var sel = Array.from(icons).find(function(i) { return i.dataset.icon === current; });
                if (sel) sel.classList.add('selected');
            }
        }
        document.addEventListener('DOMContentLoaded', bindCategoryIcons);
    </script>
</section>
</body>
</html>
