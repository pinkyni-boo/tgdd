<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Trang Quản Trị - Admin Dashboard</title>
</head>
<body>
<section layout:fragment="content">
<div class="main-container admin-page">
    
    <div class="mb-4">
        <h2 class="fw-bold text-uppercase border-start border-5 border-warning ps-3">Trang Chủ Quản Trị</h2>
        <p class="text-muted ps-4">Chào mừng Admin! Bạn muốn quản lý gì hôm nay?</p>
    </div>

    <!-- Dashboard Tiles -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        
        <!-- Product Management -->
        <div class="col">
            <div class="card h-100 shadow-sm border-0 hover-shadow">
                <div class="card-body text-center py-5">
                    <div class="mb-3 text-warning">
                        <i class="fa-solid fa-mobile-screen-button fa-4x"></i>
                    </div>
                    <h4 class="card-title fw-bold">Sản Phẩm</h4>
                    <p class="card-text text-muted">Quản lý danh sách điện thoại, laptop...</p>
                    <a href="/products" class="btn btn-warning w-75 fw-bold">Quản Lý </a>
                </div>
            </div>
        </div>

        <!-- Category Management -->
        <div class="col">
            <div class="card h-100 shadow-sm border-0 hover-shadow">
                <div class="card-body text-center py-5">
                    <div class="mb-3 text-primary">
                        <i class="fa-solid fa-layer-group fa-4x"></i>
                    </div>
                    <h4 class="card-title fw-bold">Danh Mục</h4>
                    <p class="card-text text-muted">Quản lý các loại sản phẩm...</p>
                    <a href="/categories" class="btn btn-primary w-75 fw-bold text-white">Quản Lý </a>
                </div>
            </div>
        </div>

        <!-- Order Management (Active) -->
        <div class="col">
            <div class="card h-100 shadow-sm border-0 hover-shadow">
                <div class="card-body text-center py-5">
                    <div class="mb-3 text-success">
                        <i class="fa-solid fa-cart-shopping fa-4x"></i>
                    </div>
                    <h4 class="card-title fw-bold">Đơn Hàng</h4>
                    <p class="card-text text-muted">Xem và xử lý đơn đặt hàng...</p>
                    <a href="/orders" class="btn btn-success w-75 fw-bold">Xem Đơn Hàng</a>
                </div>
            </div>
        </div>
        
    </div>
    
    <div class="mt-5 text-end">
        <a href="/" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Về Trang Web Bán Hàng
        </a>
    </div>

</div>
</section>
</body>
</html>
