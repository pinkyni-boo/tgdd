<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background:#f3f5f7;">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 mb-2 fw-bold">Đăng ký tài khoản</h1>
                    <p class="text-muted mb-4">Tài khoản mới mặc định sẽ có quyền USER.</p>

                    <div th:if="${errors}" class="alert alert-danger" role="alert">
                        <ul class="mb-0">
                            <li th:each="error : ${errors}" th:text="${error}"></li>
                        </ul>
                    </div>

                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}"
                                   placeholder="Nhập email" required>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}"
                                   placeholder="Nhập tên đăng nhập" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}"
                                   placeholder="Nhập mật khẩu" required>
                        </div>
                        <div class="mb-4">
                            <label for="phone" class="form-label fw-semibold">Số điện thoại</label>
                            <input type="tel" class="form-control" id="phone" th:field="*{phone}"
                                   placeholder="Nhập số điện thoại" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-semibold">Đăng ký</button>
                            <a th:href="@{/login}" class="btn btn-outline-secondary">Đã có tài khoản? Đăng nhập</a>
                            <a th:href="@{/}" class="btn btn-link text-decoration-none">Về trang chủ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
