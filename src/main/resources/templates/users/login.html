<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background:#f3f5f7;">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 mb-2 fw-bold">Đăng nhập</h1>
                    <p class="text-muted mb-4">Đăng nhập để mua hàng, tích điểm và đổi điểm bằng OTP.</p>

                    <div th:if="${param.error}" class="alert alert-danger mb-3">
                        Sai tên đăng nhập hoặc mật khẩu.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success mb-3">
                        Bạn đã đăng xuất thành công.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Nhập tên đăng nhập" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Nhập mật khẩu" required>
                        </div>
                        <div class="form-check mb-4">
                            <input type="checkbox" class="form-check-input" name="remember-me" id="remember-me">
                            <label class="form-check-label" for="remember-me">Ghi nhớ đăng nhập</label>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-semibold">Đăng nhập</button>
                            <a th:href="@{/register}" class="btn btn-outline-secondary">Chưa có tài khoản? Đăng ký</a>
                            <a th:href="@{/}" class="btn btn-link text-decoration-none">Về trang chủ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
